services:
  - type: web
    name: ghostpolicy-rag
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MISTRAL_API_KEY
        sync: false # User must set this in Render UI
      - key: PYTHON_VERSION
        value: 3.11.0
    restartPolicy:
      always: true
